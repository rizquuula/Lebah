name: Release

on:
  push:
    tags: ['v*']

jobs:
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.generate.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes via OpenRouter
        id: generate
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          RELEASE_NOTES_PROMPT: ${{ secrets.RELEASE_NOTES_PROMPT }}
        run: |
          # Get commits since previous tag (or last 50 if no previous tag)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" | head -50)
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          MODEL="${OPENROUTER_MODEL:-google/gemini-flash-1.5}"
          BASE_PROMPT="${RELEASE_NOTES_PROMPT:-You are writing release notes for a desktop app. Based on these git commits, write concise and user-friendly release notes in markdown. Group changes into sections like ## What's New, ## Fixes, ## Improvements where relevant. Keep it brief and focused on user impact. Do not add any preamble or closing remarks.}"

          PROMPT=$(printf '%s\n\nVersion: %s\nCommits:\n%s' "$BASE_PROMPT" "$VERSION" "$COMMITS")

          echo "DEBUG: OPENROUTER_API_KEY is set: $([ -n "$OPENROUTER_API_KEY" ] && echo 'yes' || echo 'no')"
          echo "DEBUG: MODEL = $MODEL"

          curl_exit_code=0
          curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${GITHUB_REPOSITORY}" \
            -H "X-Title: Lebah" \
            -d "$(jq -n \
              --arg model "$MODEL" \
              --arg prompt "$PROMPT" \
              '{model: $model, messages: [{role: "user", content: $prompt}]}'
            )" > api_response.json || curl_exit_code=$?

          echo "DEBUG: curl exit code = $curl_exit_code"
          echo "DEBUG: API Response:"
          cat api_response.json
          echo ""

          RESPONSE=$(cat api_response.json)
          if ! echo "$RESPONSE" | jq -e '.choices' > /dev/null 2>&1; then
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // "Unknown error" // "Invalid JSON response"')
            echo "::error::OpenRouter API failed (exit: $curl_exit_code): $ERROR_MSG"
            exit 1
          fi

          BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "See assets below for downloads."')

          # Write to file to handle multiline safely
          echo "$BODY" > release_notes.txt
          {
            echo 'release_body<<EOF'
            cat release_notes.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: release-notes
    permissions:
      contents: write
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc

          - name: Windows x86
            os: windows-latest
            target: i686-pc-windows-msvc

          - name: Linux amd64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - name: Linux arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin

          - name: macOS Silicon
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update version in tauri.conf.json
        shell: bash
        run: |
          cd src-tauri
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" tauri.conf.json
          rm -f tauri.conf.json.bak

      - name: Update version in Cargo.toml
        shell: bash
        run: |
          cd src-tauri
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Install Linux system dependencies
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Node dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Lebah ${{ github.ref_name }}"
          releaseBody: ${{ needs.release-notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
